seed: 59
start_time: ${now:%Y-%m-%d_%H%M%S}
task_name: finetune_torca
train: true
test: true
callbacks:
  lr_monitor:
    _target_: lightning.pytorch.callbacks.LearningRateMonitor
    logging_interval: step
  progress_bar:
    _target_: lightning.pytorch.callbacks.TQDMProgressBar
    refresh_rate: 500
  model_checkpoint:
    _target_: lightning.pytorch.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/checkpoints
    filename: ${module.network.name}_${data.dataset.name}_{epoch:02d}
    save_last: true
    save_top_k: 0
data:
  dataset:
    parquet_path: /home/tundra/projects/torca/ds/subsample.parquet
    dataset_dir: ${paths.dataset_dir}
    name: DCLDE_no_balance
    num_workers: 4
    columns:
    - ID
    - Soundfile
    - Provider
    - Dataset
    - Labels
    - FileBeginSec
    - FileEndSec
    - Duration
    - CalltypeCategory
    - Buzz
    - NewPath
    test_hydros:
    - StraitofGeorgia
    - StrGeoS1
    val_hydros:
    - CarmanahPt
    low_sr_hydros:
    - NorthBc
    - WVanIsl
    - orcasound_lab
    - MS_671879205
    - Field_HTI
    - KB_67383303
    - RB_335826997
    - KB_67424266
    - HE_67424266
    - RB_67424266
    - HE_67391498
    - MS_6897
    - KB_5354
    - MS_5360
    - Field_SondTrap
    class_to_balance: {}
    mean: -42.456
    std: 15.718
    clip_duration: 5.0
    target_length: ${data.transform.target_length}
    num_classes: 8
  loaders:
    train:
      num_workers: 8
      batch_size: 64
      shuffle: true
      drop_last: true
    val:
      num_workers: 8
      batch_size: 64
      shuffle: false
    test:
      num_workers: 4
      batch_size: 48
      shuffle: false
  transform:
    input:
      type: birdset
      n_fft: 1024
      hop_length: 320
      power: 2.0
      n_mels: 128
      sample_rate: 32000
      n_stft: 513
      mean: ${data.dataset.mean}
      std: ${data.dataset.std}
    clip_duration: ${data.dataset.clip_duration}
    target_length: 512
    freqm: 0
    timem: 0
    spectrogram_augmentations:
      frequency_masking:
        _target_: torchvision.transforms.RandomApply
        p: 0.3
        transforms:
        - _target_: torchaudio.transforms.FrequencyMasking
          freq_mask_param: 50
          iid_masks: true
      time_masking:
        _target_: torchvision.transforms.RandomApply
        p: 0.3
        transforms:
        - _target_: torchaudio.transforms.TimeMasking
          time_mask_param: 100
          iid_masks: true
    mask2d: false
    mask_t_prob: 0.0
    mask_f_prob: 0.0
logger:
  _target_: pytorch_lightning.loggers.mlflow.MLFlowLogger
  experiment_name: Finetune with no pre-training
  run_name: ${task_name}_${data.dataset.name}_${start_time}
  tracking_uri: ${paths.log_dir}/mlflow/mlruns
  tags: null
  prefix: ''
  artifact_location: null
module:
  network:
    name: VIT_ppnet
    norm_layer: nn.LayerNorm
    sampling_rate: 32000
    img_size_x: ${data.dataset.target_length}
    img_size_y: 128
    patch_size: 16
    in_chans: 1
    embed_dim: 768
    global_pool: true
    mlp_ratio: 4
    qkv_bias: true
    eps: 1.0e-06
    num_heads: 12
    depth: 12
    drop_path: 0.1
    num_classes: ${data.dataset.num_classes}
    pos_trainable: false
    pretrained_weights_path: /home/lrauch/AudioMAE_XCL_epoch=99_mixup.ckpt
    target_length: ${data.dataset.target_length}
    mask2d: ${data.transform.mask2d}
    mask_t_prob: ${data.transform.mask_t_prob}
    mask_f_prob: ${data.transform.mask_f_prob}
    freeze_backbone: true
    mask_inference: null
    ema_update_rate: null
    ppnet:
      num_prototypes: 420
      channels_prototypes: 768
      h_prototypes: 1
      w_prototypes: 1
      num_classes: ${data.dataset.num_classes}
      topk_k: 1
      margin: null
      init_weights: true
      add_on_layers_type: upsample
      incorrect_class_connection: null
      correct_class_connection: 1.0
      bias_last_layer: -2.0
      non_negative_last_layer: true
      embedded_spectrogram_height: null
      last_layer_lr: 0.0003
      prototype_lr: 0.04
      focal_similarity: true
  optimizer:
    target:
      _target_: torch.optim.AdamW
      lr: 0.001
      weight_decay: 0.0001
      betas:
      - 0.9
      - 0.95
    extras:
      train_batch_size: ${data.loaders.train.batch_size}
      layer_decay: 0.75
      decay_type: right
  scheduler:
    _target_: timm.scheduler.CosineLRScheduler
  loss:
    _target_: util.asymmetric_loss.AsymmetricLossMultiLabel
  metric:
    _target_: torchmetrics.AveragePrecision
    task: multiclass
    num_classes: ${data.dataset.num_classes}
    average: macro
    thresholds: null
    additional:
      AUC_per_class:
        _target_: torchmetrics.AveragePrecision
        task: multiclass
        num_classes: ${data.dataset.num_classes}
        average: none
        thresholds: null
      PR_curve:
        _target_: torchmetrics.PrecisionRecallCurve
        task: multiclass
        num_classes: ${data.dataset.num_classes}
        average: macro
        thresholds: null
paths:
  root_dir: ${oc.env:PROJECT_ROOT}
  work_dir: ${hydra:runtime.cwd}
  output_dir: ${hydra:runtime.output_dir}
  dataset_dir: ${paths.root_dir}/data/
  model_dir: ${paths.output_dir}/checkpoints/
  log_dir: ${paths.root_dir}/logs/
  background_dir: ${paths.root_dir}/data/background_noise/
trainer:
  default_root_dir: ${paths.output_dir}
  min_epochs: 1
  max_epochs: 60
  accelerator: gpu
  devices: 1
  enable_checkpointing: true
  enable_model_summary: false
  enable_progress_bar: true
  num_sanity_val_steps: 0
  limit_val_batches: 1.0
  barebones: false
  check_val_every_n_epoch: 5
  strategy: auto
  deterministic: false
  gradient_clip_val: null
  accumulate_grad_batches: 1
  precision: bf16
