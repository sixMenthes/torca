# @package _global_
defaults:
  - override /callbacks: default_ssl
  - override /data/dataset: XCM
  - override /data/loaders: audioset_balanced
  - override /data/transform: pretrain_melbank_birdset
  - override /logger: mlflow_sql
  - override /module/network: eat_vitbase_16
  - override /module/scheduler: cosine
  - override /module/optimizer: null
  - override /module/loss: mean_squared_error
  - override /paths: workstation
  - override /trainer: single_gpu

seed: 42
start_time: ${now:%Y-%m-%d_%H%M%S}
task_name: pretrain_xcm_eat # improve this

module:
  network:
    compile_mode: null
    task: 
      cls_task: "regression"
      feature_regularizer: "var"
      clustering_regularizer: null
      regularize_patch_tokens: true
      use_teacher_assistant: false
      multi_view: true

data:
  loaders:
    train: 
      num_workers: 32
      batch_size: 4
      shuffle: true
  dataset:
    test_in_val: false


logger:
  experiment_name: ${task_name}

trainer:
  max_epochs: 30
  limit_val_batches: 0.0
  check_val_every_n_epoch: 0
  enable_checkpointing: true

# module:
#   optimizer:
#     target:
#       lr: 2e-4
#     extras:
#       layer_decay: 0.0
#   network:
#     sampling_rate: 32_000 

callbacks:
  model_checkpoint:
    dirpath: ${paths.output_dir}/callback_checkpoints
    filename: ${module.network.name}_${data.dataset.name}_{epoch:02d}
    save_last: true
    save_weights_only: false
    every_n_epochs: 5
    save_top_k: -1
    save_on_train_epoch_end: true

  progress_bar:
    refresh_rate: 1



