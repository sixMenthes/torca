name: VIT_ppnet
norm_layer: nn.LayerNorm
sampling_rate: 32_000
img_size_x: ${data.dataset.target_length}
img_size_y: 128
patch_size: 16
in_chans: 1
embed_dim: 768
global_pool: True
mlp_ratio: 4
qkv_bias: True
eps: 1e-6
num_heads: 12
depth: 12
drop_path: 0.1
num_classes: ${data.dataset.num_classes} 
pos_trainable: False
pretrained_weights_path: /home/tundra/projects/torca/pretrained/Bird-MAE-B
target_length: ${data.dataset.target_length}
mask2d: ${data.transform.mask2d}
mask_t_prob: ${data.transform.mask_t_prob}
mask_f_prob: ${data.transform.mask_f_prob}
freeze_backbone: true
mask_inference: null
ema_update_rate: null

# Trainable PCEN front-end (replaces log-mel compression). Single switch:
# `enable` also drives data.transform.pcen via interpolation, so the transform
# emits linear mel when this is on. alpha/delta/r are per-mel-band, trained in
# log-space; s (smoother) and eps are fixed. See PCEN in models/vit/vit.py.
pcen:
  enable: false
  trainable: true
  s: 0.025
  eps: 1e-6
  alpha: 0.98
  delta: 2.0
  r: 0.5


ppnet: 
  num_prototypes: 420
  channels_prototypes: 768
  h_prototypes: 1
  w_prototypes: 1
  num_classes: ${data.dataset.num_classes}
  topk_k: 1
  margin: null
  init_weights: true
  add_on_layers_type: upsample
  incorrect_class_connection: null
  correct_class_connection: 1.0
  bias_last_layer: -2.0
  non_negative_last_layer: true
  embedded_spectrogram_height: null
  last_layer_lr: 3e-4
  prototype_lr: 0.04
  focal_similarity: true
