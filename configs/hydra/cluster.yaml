defaults: 
  - override hydra_logging: colorlog
  - override job_logging: colorlog 

job:
  chdir: True
run:
  dir: ${paths.scratch_dir}/runs/${task_name}/${data.dataset.name}/${module.network.name}/${now:%Y-%m-%d_%H%M%S}
sweep:
  dir: ${paths.scratch_dir}/runs/${task_name}/multiruns/${data.dataset.name}/${module.network.name}/${now:%Y-%m-%d_%H%M%S}
  subdir: ${hydra.job.num}