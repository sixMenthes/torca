# @package _global_
defaults:
  - override /callbacks: default_ssl
  - override /data/dataset: HSN
  - override /data/loaders: esc50
  - override /data/transform: melbank_birdset
  - override /logger: mlflow
  - override /module/network: vit_base_16.yaml
  - override /module/optimizer: adamw
  - override /module/scheduler: cosine
  - override /module/loss: asymmetric_loss.yaml
  - override /module/metric: birdset_collection
  - override /paths: cluster
  - override /trainer: single_gpu

seed: 1
start_time: ${now:%Y-%m-%d_%H%M%S}
task_name: "finetune_hsn"

train: true
test: true

logger:
  experiment_name: full_hsn
  run_name: birdMAE_hsn_base_linear_64shot_${seed}_${start_time}

data:
  loaders:
    train: 
      num_workers: 16
      batch_size: 64
      shuffle: true
      drop_last: true
  dataset:
    save_to_disk: /scratch/birdset/HSN/HSN_processed_42_af8bbf517e45e99d_d9dd5751bb728754_c3aa30664ea8e4a0

trainer:
  max_epochs: 30
  limit_val_batches: 1.0
  check_val_every_n_epoch: 2
  gradient_clip_val: 2
  precision: 16-mixed
  num_sanity_val_steps: 0


module:
  optimizer:
    target:
      lr: 4e-4
      weight_decay: 3e-4
      
    extras:
      layer_decay: 0.75
      decay_type: right
      
  network:
    ema_update_rate: null
    freeze_backbone: true 