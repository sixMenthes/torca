    #pretrained_weights_path: /home/lrauch/mnt_check/pretrain_xcl_eat_base/runs/XCL/EAT/2025-08-08_124305/callback_checkpoints/EAT_XCL_epoch=59.ckpt # eat+dino
    #pretrained_weights_path: /home/lrauch/mnt_check/pretrain_xcl_eat_base/runs/XCL/EAT/2025-08-05_102803/callback_checkpoints/EAT_XCL_epoch=19.ckpt # eat+dino
