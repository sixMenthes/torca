# @package _global_
defaults:
  - override /callbacks: default
  - override /data/dataset: HSN
  - override /data/loaders: esc50
  - override /data/transform: melbank_birdset
  - override /logger: mlflow
  - override /module/network: vit_base_16_eat.yaml
  - override /module/optimizer: adamw
  - override /module/scheduler: cosine
  - override /module/loss: asymmetric_loss
  - override /module/metric: birdset_collection
  - override /paths: workstation
  - override /trainer: single_gpu

seed: 42
start_time: ${now:%Y-%m-%d_%H%M%S}
task_name: "overnight_hsn_base"

train: true
test: true

logger:
  experiment_name: ${task_name}

data:
  loaders:
    train: 
      num_workers: 24
      batch_size: 64
      #batch_size: 20
      shuffle: true
      drop_last: true

    
trainer:
  max_epochs: 30
  limit_val_batches: 1.0
  check_val_every_n_epoch: 2
  #gradient_clip_val: 0.1
  gradient_clip_val: 2
  precision: 16-mixed
  num_sanity_val_steps: 0


module:
  optimizer:
    target:
      #lr: 5e-4
      lr: 0.00005
      #lr: 5e-4
      #lr: 1e-4
      #weight_decay: 3e-2
      weight_decay: 3e-4
      
    extras:
      layer_decay: 0.75
      decay_type: right
      
  network:
    freeze_backbone: false
    global_pool: cls
    #pretrained_weights_path: /home/lrauch/mnt_check/pretrain_xcl_eat_base/runs/XCL/EAT/2025-07-23_225933/callback_checkpoints/EAT_XCL_epoch=29.ckpt
